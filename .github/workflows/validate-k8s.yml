name: Validate Kubernetes manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  KUBECONFORM_VERSION: "0.8.0"

jobs:
  validate-manifests:
    name: Validate raw manifests (Phase A)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests against Kubernetes schemas
        run: kubeconform -strict -summary -verbose modern-kubernetes/manifests/*.yaml

  validate-helm-chart:
    name: Lint and validate Helm chart (Phase B)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Lint chart
        run: helm lint modern-kubernetes/helm/devops-tools

      - name: Validate rendered templates against Kubernetes schemas
        run: helm template modern-kubernetes/helm/devops-tools | kubeconform -strict -summary -verbose
