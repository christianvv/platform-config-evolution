apiVersion: apps/v1
kind: Deployment
metadata:
  name: directory-services
  namespace: devops-tools
  labels:
    app: directory-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directory-services
  template:
    metadata:
      labels:
        app: directory-services
    spec:
      containers:
        - name: directory-services
          image: "osixia/openldap:1.5.0"
          ports:
            - containerPort: 389
          env:
            - name: LDAP_ORGANISATION
              value: "Example Org"
            - name: LDAP_DOMAIN
              value: "example.org"
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-admin-secret
                  key: admin-password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
